name: Recovery Validation

on:
  push:
    branches:
      - recovery/2026-06-16-regression-repair
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RECOVERY_ARTIFACT_DIR: /tmp/vaw-recovery-artifacts
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@v4
        with:
          ref: recovery/2026-06-16-regression-repair
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Record environment
        run: |
          mkdir -p "$RECOVERY_ARTIFACT_DIR/logs"
          python --version | tee "$RECOVERY_ARTIFACT_DIR/logs/environment.txt"
          node --version | tee -a "$RECOVERY_ARTIFACT_DIR/logs/environment.txt"
          git rev-parse HEAD | tee -a "$RECOVERY_ARTIFACT_DIR/logs/environment.txt"
          git status --short --branch | tee -a "$RECOVERY_ARTIFACT_DIR/logs/environment.txt"

      - name: Apply staged hinge-authoring fix when present
        id: apply_fix
        run: |
          set -euo pipefail
          if [ ! -f .recovery/hinge-authoring.patch.gz.b64 ]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base64 --decode .recovery/hinge-authoring.patch.gz.b64 | gzip --decompress > /tmp/hinge-authoring.patch
          git apply --check /tmp/hinge-authoring.patch
          git apply --index /tmp/hinge-authoring.patch
          git rm .recovery/hinge-authoring.patch.gz.b64
          git diff --cached --check
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Compile Python
        run: |
          set -o pipefail
          python -m compileall . 2>&1 | tee "$RECOVERY_ARTIFACT_DIR/logs/compileall.log"

      - name: Run focused hinge regression checks
        if: steps.apply_fix.outputs.applied == 'true'
        run: |
          set -euo pipefail
          node --check src/game.js
          node --check src/game/blueprint_controller.js
          node --check tests/startup_smoke.js
          node --check tests/run_browser_recovery.mjs
          python tests/test_game_architecture.py
          python tests/static_check.py

      - name: Run full suite
        run: |
          set -o pipefail
          python -u tests/run_all.py 2>&1 | tee "$RECOVERY_ARTIFACT_DIR/logs/run_all.log"

      - name: Build release
        run: |
          set -o pipefail
          python tools/build_release.py 2>&1 | tee "$RECOVERY_ARTIFACT_DIR/logs/build_release.log"

      - name: Verify release
        run: |
          set -o pipefail
          python tools/verify_release.py 2>&1 | tee "$RECOVERY_ARTIFACT_DIR/logs/verify_release.log"

      - name: Check whitespace
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee "$RECOVERY_ARTIFACT_DIR/logs/git_diff_check.log"

      - name: Commit verified hinge-authoring fix
        if: steps.apply_fix.outputs.applied == 'true'
        run: |
          set -euo pipefail
          git restore --worktree .
          git clean -fd
          git diff --cached --check
          git config user.name "VAW Recovery Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Fix hinge authoring toggle lifecycle"
          git push origin HEAD:recovery/2026-06-16-regression-repair

      - name: Copy clean repository snapshot
        if: always()
        run: |
          mkdir -p "$RECOVERY_ARTIFACT_DIR/repository"
          rsync -a \
            --exclude='.git' \
            --exclude='recovery-artifacts' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            ./ "$RECOVERY_ARTIFACT_DIR/repository/"

      - name: Upload recovery snapshot and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vaw-recovery-final-${{ github.sha }}
          path: /tmp/vaw-recovery-artifacts
          if-no-files-found: error
          retention-days: 7
