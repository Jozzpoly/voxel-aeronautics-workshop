name: Recovery Apply Focus Patch

on:
  push:
    branches:
      - recovery/2026-06-16-regression-repair
    paths:
      - .recovery/focus-stage.patch.gz.b64

permissions:
  contents: write

concurrency:
  group: vaw-recovery-focus-apply
  cancel-in-progress: false

jobs:
  apply-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact recovery head
        uses: actions/checkout@v4
        with:
          ref: recovery/2026-06-16-regression-repair
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Decode and preflight patch
        run: |
          set -euo pipefail
          base64 --decode .recovery/focus-stage.patch.gz.b64 | gzip --decompress > /tmp/focus-stage.patch
          git apply --check /tmp/focus-stage.patch

      - name: Apply exact focus checkpoint
        run: |
          set -euo pipefail
          git apply --index /tmp/focus-stage.patch
          git rm .recovery/focus-stage.patch.gz.b64
          git diff --cached --check

      - name: Run focused regression tests
        run: |
          set -euo pipefail
          node --check src/game/input_settings_controller.js
          node --check src/game.js
          node --check tests/startup_smoke.js
          node tests/test_input_focus_policy.js
          python tests/test_game_architecture.py

      - name: Run full suite
        run: python -u tests/run_all.py

      - name: Build and verify release
        run: |
          set -euo pipefail
          python tools/build_release.py
          python tools/verify_release.py
          git diff --check

      - name: Discard generated worktree outputs only
        run: |
          set -euo pipefail
          git restore --worktree .
          git clean -fd
          git diff --cached --check
          git status --short

      - name: Commit verified focus repair
        run: |
          set -euo pipefail
          git config user.name "VAW Recovery Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Fix UI focus and hotkey routing regressions"
          git push origin HEAD:recovery/2026-06-16-regression-repair
