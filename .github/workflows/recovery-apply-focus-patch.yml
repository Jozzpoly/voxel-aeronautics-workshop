name: Recovery Apply Verified Stage

on:
  push:
    branches:
      - recovery/2026-06-16-regression-repair
    paths:
      - .recovery/browser-trigger.txt

permissions:
  contents: write

concurrency:
  group: vaw-recovery-stage-apply
  cancel-in-progress: false

jobs:
  apply-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact recovery head
        uses: actions/checkout@v4
        with:
          ref: recovery/2026-06-16-regression-repair
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Decode and preflight patch
        run: |
          set -euo pipefail
          base64 --decode .recovery/browser-stage.patch.gz.b64 | gzip --decompress > /tmp/browser-stage.patch
          git apply --check /tmp/browser-stage.patch

      - name: Apply exact browser checkpoint
        run: |
          set -euo pipefail
          git apply --index /tmp/browser-stage.patch
          git rm .recovery/browser-stage.patch.gz.b64 .recovery/browser-trigger.txt
          git diff --cached --check

      - name: Run focused checks
        run: |
          set -euo pipefail
          node --check tests/run_browser_recovery.mjs
          python tests/test_game_architecture.py
          python tests/static_check.py

      - name: Run full suite and release validation
        run: |
          set -euo pipefail
          python -u tests/run_all.py
          python tools/build_release.py
          python tools/verify_release.py
          git diff --check

      - name: Run real Chromium recovery scenario
        run: |
          set -euo pipefail
          CHROME_BIN="$(command -v chromium || command -v google-chrome || command -v google-chrome-stable || true)"
          test -n "$CHROME_BIN"
          command -v xvfb-run
          CHROMIUM="$CHROME_BIN" node tests/run_browser_recovery.mjs

      - name: Preserve browser evidence and restore generated outputs
        run: |
          set -euo pipefail
          git add recovery-artifacts/browser
          git restore --worktree .
          git clean -fd
          git diff --cached --check
          git status --short

      - name: Commit verified browser scenario
        run: |
          set -euo pipefail
          git config user.name "VAW Recovery Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Add browser regression scenario"
          git push origin HEAD:recovery/2026-06-16-regression-repair
