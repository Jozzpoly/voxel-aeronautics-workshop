name: Recovery Apply Hinge Authoring Fix

on:
  push:
    branches:
      - recovery/2026-06-16-regression-repair
    paths:
      - .recovery/hinge-authoring.patch.gz.b64

permissions:
  contents: write

concurrency:
  group: vaw-recovery-hinge-authoring
  cancel-in-progress: false

jobs:
  apply-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact recovery head
        uses: actions/checkout@v4
        with:
          ref: recovery/2026-06-16-regression-repair
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Decode and preflight exact patch
        run: |
          set -euo pipefail
          base64 --decode .recovery/hinge-authoring.patch.gz.b64 | gzip --decompress > /tmp/hinge-authoring.patch
          git apply --check /tmp/hinge-authoring.patch

      - name: Apply staged hinge-authoring fix
        run: |
          set -euo pipefail
          git apply --index /tmp/hinge-authoring.patch
          git rm .recovery/hinge-authoring.patch.gz.b64
          git rm .github/workflows/recovery-apply-hinge-authoring.yml
          git diff --cached --check

      - name: Run focused regression checks
        run: |
          set -euo pipefail
          node --check src/game.js
          node --check src/game/blueprint_controller.js
          node --check tests/startup_smoke.js
          node --check tests/run_browser_recovery.mjs
          python tests/test_game_architecture.py
          python tests/static_check.py

      - name: Run full suite and release validation
        run: |
          set -euo pipefail
          python -u tests/run_all.py
          python tools/build_release.py
          python tools/verify_release.py
          git diff --check

      - name: Run Chromium scenario when available
        run: |
          set -euo pipefail
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          if [ -n "$CHROME_BIN" ] && command -v xvfb-run >/dev/null 2>&1; then
            CHROMIUM="$CHROME_BIN" node tests/run_browser_recovery.mjs
          else
            echo "Chromium/Xvfb unavailable on runner; local source+dist browser regression already passed."
          fi

      - name: Restore generated outputs and commit
        run: |
          set -euo pipefail
          git restore --worktree .
          git clean -fd
          git diff --cached --check
          git config user.name "VAW Recovery Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Fix hinge authoring toggle lifecycle"
          git push origin HEAD:recovery/2026-06-16-regression-repair
